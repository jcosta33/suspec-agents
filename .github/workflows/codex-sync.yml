name: codex-sync

# The .codex no-diff guard (SPEC-agents-mcp-rearchitecture AC-005 / AUDIT-suspec-agents F7).
# `.codex/agents/*.toml` is GENERATED from `agents/*.md` and committed; this job fails the build when
# the committed `.codex/` drifts from what `suspec agents emit --codex` produces, so a stale TOML is
# caught in CI rather than discovered later.

# Check-only job: it needs to read two public repos and nothing else.
permissions:
  contents: read

on:
  push:
    paths:
      - 'agents/**'
      - '.codex/**'
      - 'scripts/check-codex-sync.sh'
      - '.github/workflows/codex-sync.yml'
  pull_request:
    paths:
      - 'agents/**'
      - '.codex/**'
      - 'scripts/check-codex-sync.sh'
      - '.github/workflows/codex-sync.yml'

jobs:
  check-codex-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out suspec-agents
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install the suspec CLI so `suspec agents emit --codex` is available. Replace this with the real
      # install once suspec-cli is published (e.g. `npm i -g @suspec/cli`); until then, check out the
      # sibling suspec-cli and point the guard at it via SUSPEC_EMIT.
      # The suspec-cli ref deliberately floats: the guard's job is to verify the TOMLs stay in sync
      # with the CURRENT emitter, not a pinned one.
      - name: Install suspec CLI (sibling checkout — prereq)
        uses: actions/checkout@v4
        with:
          repository: jcosta33/suspec-cli
          path: suspec-cli
          persist-credentials: false
      - name: Build suspec CLI
        working-directory: suspec-cli
        run: |
          corepack enable
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Run the .codex no-diff guard
        env:
          # The guard auto-detects `suspec` on PATH or ../suspec-cli/bin/suspec.js; SUSPEC_EMIT pins it
          # explicitly to the checkout above.
          SUSPEC_EMIT: 'node suspec-cli/bin/suspec.js'
        run: bash scripts/check-codex-sync.sh
